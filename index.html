<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0B0C0E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Capital">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <title>Capital — накопления</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0B0C0E;
            font-family: -apple-system, 'Inter', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            letter-spacing: -0.01em;
        }
        .app {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }
        .card {
            background: #121316;
            border-radius: 28px;
            padding: 24px 20px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.04);
        }
        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 500;
            color: #8E8E92;
            margin-bottom: 0.3rem;
        }
        .value-large {
            font-size: 2rem;
            font-weight: 600;
            color: #FFFFFF;
            line-height: 1.2;
            letter-spacing: -0.02em;
            word-break: break-word;
        }
        .value-negative {
            color: #D9634D;
        }
        .value-medium {
            font-size: 1.2rem;
            font-weight: 500;
            color: #FFFFFF;
            word-break: break-word;
        }
        @media (max-width: 450px) {
            .value-large { font-size: 1.6rem; }
            .value-medium { font-size: 1rem; }
        }
        .metrics-grid {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
            margin-bottom: 28px;
            justify-content: flex-start;
        }
        .metric {
            flex: 1;
            min-width: 120px;
        }
        .goal-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .goal-title {
            font-size: 1.35rem;
            font-weight: 500;
            color: #FFFFFF;
            letter-spacing: -0.3px;
            word-break: break-word;
            flex: 1;
        }
        .goal-badge {
            font-size: 0.75rem;
            font-weight: 500;
            background: rgba(255,255,255,0.04);
            padding: 8px 16px;
            border-radius: 100px;
            color: #CFCFD4;
            cursor: pointer;
            transition: all 0.15s;
            border: 0.5px solid rgba(255,255,255,0.1);
            white-space: nowrap;
        }
        .goal-badge:active {
            background: rgba(255,255,255,0.12);
            transform: scale(0.96);
        }
        .progress-container {
            margin: 24px 0 20px;
        }
        .progress-track {
            background: #26272D;
            border-radius: 100px;
            height: 6px;
            width: 100%;
            overflow: hidden;
        }
        .progress-fill {
            background: #D4AF37;
            width: 0%;
            height: 100%;
            border-radius: 100px;
            transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .progress-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 0.75rem;
            font-weight: 450;
            color: #9A9AA0;
        }
        .form-area {
            margin: 28px 0 20px;
        }
        .form-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .field {
            width: 100%;
        }
        .field label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #8E8E94;
            margin-bottom: 6px;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            background: #1A1B1F;
            border: 1px solid #2A2B30;
            border-radius: 18px;
            padding: 14px 16px;
            font-size: 1rem;
            color: #FFFFFF;
            font-family: inherit;
            outline: none;
            transition: border 0.15s, background 0.15s;
        }
        input {
            letter-spacing: 0.5px;
            font-weight: 500;
        }
        input:focus, select:focus {
            border-color: #D4AF37;
            background: #1F2025;
        }
        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23A0A0A8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 16px center;
        }
        .btn {
            background: #D4AF37;
            border: none;
            border-radius: 28px;
            padding: 14px 20px;
            font-weight: 600;
            font-size: 1rem;
            color: #0B0C0E;
            cursor: pointer;
            transition: all 0.1s;
            font-family: inherit;
            margin-top: 8px;
            width: 100%;
        }
        .btn:active {
            background: #E5C252;
            transform: scale(0.97);
        }
        .history-section {
            margin-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.06);
            padding-top: 20px;
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .history-actions {
            display: flex;
            gap: 8px;
        }
        .history-toggle, .clear-history-btn {
            background: none;
            border: 0.5px solid #2D2E35;
            color: #B0B0B8;
            font-size: 0.75rem;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.1s;
        }
        .history-toggle:active, .clear-history-btn:active {
            background: rgba(255,255,255,0.05);
            transform: scale(0.96);
        }
        .history-list {
            max-height: 460px;
            overflow-y: auto;
            transition: all 0.2s;
            -webkit-overflow-scrolling: touch;
        }
        .history-list.hidden {
            display: none;
        }
        .transaction-item {
            background: #0F1013;
            border-radius: 20px;
            padding: 12px 14px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 0.5px solid rgba(255,255,255,0.04);
        }
        .transaction-left {
            flex: 1;
            padding-right: 10px;
        }
        .transaction-type {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            margin-bottom: 3px;
        }
        .income-type { color: #2E9B4B; }
        .expense-type { color: #D9634D; }
        .correction-type { color: #6C8EBF; }
        .transaction-note {
            font-size: 0.75rem;
            color: #CACAD2;
            font-weight: 450;
            margin: 3px 0;
            word-break: break-word;
        }
        .transaction-date {
            font-size: 0.6rem;
            color: #6F6F78;
        }
        .transaction-amount {
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: -0.2px;
            white-space: nowrap;
        }
        .income-amount { color: #2E9B4B; }
        .expense-amount { color: #D9634D; }
        .correction-amount { color: #6C8EBF; }
        .delete-transaction {
            background: none;
            border: none;
            color: #5A5A64;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 40px;
            transition: 0.1s;
            margin-left: 6px;
            min-width: 36px;
        }
        .delete-transaction:active {
            color: #D4AF37;
            background: rgba(212,175,55,0.1);
            transform: scale(0.94);
        }
        .empty-history {
            text-align: center;
            padding: 28px 16px;
            color: #5E5E68;
            font-size: 0.75rem;
            border: 1px dashed rgba(255,255,255,0.05);
            border-radius: 24px;
        }
        footer {
            font-size: 0.6rem;
            color: #484850;
            text-align: center;
            margin-top: 20px;
            padding-bottom: 6px;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #18191E;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #3A3B42;
            border-radius: 10px;
        }
        input, select, button {
            font-size: 16px;
        }
        button {
            cursor: pointer;
            touch-action: manipulation;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="card">
        <div class="goal-row">
            <div class="goal-title" id="goalNameDisplay">Капитал</div>
            <div class="goal-badge" id="editGoalBtn">редактировать</div>
        </div>

        <div class="metrics-grid">
            <div class="metric">
                <div class="label">Накоплено</div>
                <div class="value-large" id="currentAmountDisplay">0 ₽</div>
            </div>
            <div class="metric">
                <div class="label">Цель</div>
                <div class="value-medium" id="targetAmountDisplay">0 ₽</div>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-stats">
                <span id="percentSpan">0%</span>
                <span>Осталось <span id="remainderSpan">0 ₽</span></span>
            </div>
        </div>

        <div class="form-area">
            <div class="form-row">
                <div class="field">
                    <label>Тип</label>
                    <select id="transactionType">
                        <option value="income">Доход +</option>
                        <option value="expense">Расход −</option>
                    </select>
                </div>
                <div class="field">
                    <label>Сумма</label>
                    <input type="text" id="amountInput" placeholder="0" inputmode="decimal" pattern="[0-9.,]*">
                </div>
                <div class="field">
                    <label>Описание</label>
                    <input type="text" id="noteInput" placeholder="Что это?" enterkeyhint="done">
                </div>
                <button id="addTransactionBtn" class="btn">Добавить операцию</button>
            </div>
        </div>

        <div class="history-section">
            <div class="history-header">
                <span class="label" style="margin-bottom:0;">ЖУРНАЛ</span>
                <div class="history-actions">
                    <button id="clearHistoryBtn" class="clear-history-btn">Очистить</button>
                    <button id="toggleHistoryBtn" class="history-toggle">⌄ Скрыть</button>
                </div>
            </div>
            <div id="historyList" class="history-list">
                <div class="empty-history">Нет записей</div>
            </div>
        </div>
        <footer>LocalStorage • возможен минус • данные сохраняются</footer>
    </div>
</div>

<script>
    let state = {
        goalName: "Капитал",
        targetAmount: 100000,
        currentAmount: 0,
        transactions: []
    };

    const goalNameDisplay = document.getElementById('goalNameDisplay');
    const targetAmountDisplay = document.getElementById('targetAmountDisplay');
    const currentAmountDisplay = document.getElementById('currentAmountDisplay');
    const progressFill = document.getElementById('progressFill');
    const remainderSpan = document.getElementById('remainderSpan');
    const percentSpan = document.getElementById('percentSpan');
    const historyContainer = document.getElementById('historyList');
    const transactionType = document.getElementById('transactionType');
    const amountInput = document.getElementById('amountInput');
    const noteInput = document.getElementById('noteInput');
    const addBtn = document.getElementById('addTransactionBtn');
    const editGoalBtn = document.getElementById('editGoalBtn');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const toggleHistoryBtn = document.getElementById('toggleHistoryBtn');

    let historyHidden = false;

    // ИСПРАВЛЕННАЯ функция парсинга — удаляем пробелы, заменяем запятую на точку
    function parseAmount(value) {
        if (!value && value !== 0) return NaN;
        let str = String(value).trim();
        // Удаляем все пробелы
        str = str.replace(/\s/g, '');
        // Заменяем запятую на точку
        str = str.replace(',', '.');
        return parseFloat(str);
    }

    const formatMoney = (value) => {
        let num = value;
        let sign = '';
        if (num < 0) {
            sign = '−';
            num = Math.abs(num);
        }
        let rounded = Math.floor(num);
        let formatted = rounded.toLocaleString('ru-RU');
        let fractional = num - rounded;
        if (fractional > 0.009) {
            let kopecks = Math.round(fractional * 100);
            if (kopecks > 0) {
                formatted += '.' + (kopecks < 10 ? '0' + kopecks : kopecks);
            }
        }
        return (sign ? sign + ' ' : '') + formatted + ' ₽';
    };

    function recalcBalance() {
        let balance = 0;
        for (let t of state.transactions) {
            if (t.type === 'income') balance += t.amount;
            else if (t.type === 'expense') balance -= t.amount;
        }
        state.currentAmount = balance;
    }

    function persist() {
        const toStore = {
            goalName: state.goalName,
            targetAmount: state.targetAmount,
            currentAmount: state.currentAmount,
            transactions: state.transactions
        };
        localStorage.setItem('premium_goal_app', JSON.stringify(toStore));
    }

    function loadFromStorage() {
        const raw = localStorage.getItem('premium_goal_app');
        if (raw) {
            try {
                const data = JSON.parse(raw);
                state.goalName = data.goalName || "Капитал";
                state.targetAmount = (typeof data.targetAmount === 'number' && data.targetAmount > 0) ? data.targetAmount : 100000;
                state.transactions = Array.isArray(data.transactions) ? data.transactions : [];
                recalcBalance();
            } catch(e) { 
                setDefault(); 
            }
        } else {
            setDefault();
        }
        recalcBalance();
        renderAll();
    }

    function setDefault() {
        state.goalName = "Капитал";
        state.targetAmount = 100000;
        state.transactions = [];
        state.currentAmount = 0;
    }

    function addTransaction(type, amount, note) {
        if (isNaN(amount) || amount <= 0) {
            alert("Введите сумму больше нуля");
            return false;
        }
        const cleanNote = note.trim() === "" ? (type === 'income' ? "Поступление" : "Списание") : note.trim();
        const newTransaction = {
            id: Date.now(),
            type: type,
            amount: amount,
            note: cleanNote,
            date: new Date().toLocaleString(),
            timestamp: Date.now()
        };
        state.transactions.unshift(newTransaction);
        recalcBalance();
        persist();
        renderAll();
        return true;
    }

    function deleteTransaction(id) {
        state.transactions = state.transactions.filter(t => t.id !== id);
        recalcBalance();
        persist();
        renderAll();
    }

    function clearAllHistory() {
        if (confirm("Удалить всю историю? Баланс станет нулевым.")) {
            state.transactions = [];
            recalcBalance();
            persist();
            renderAll();
        }
    }

    function editGoal() {
        let newName = prompt("Название цели", state.goalName);
        if (newName !== null && newName.trim() !== "") state.goalName = newName.trim();
        
        let newTarget = prompt("Целевая сумма (₽)", formatMoney(state.targetAmount).replace(' ₽', ''));
        if (newTarget !== null) {
            const num = parseAmount(newTarget);
            if (!isNaN(num) && num > 0) state.targetAmount = num;
            else if (num <= 0) alert("Сумма должна быть больше нуля");
        }
        
        let newCurrent = prompt("Текущий баланс (₽)", formatMoney(state.currentAmount).replace(' ₽', ''));
        if (newCurrent !== null && newCurrent.trim() !== "") {
            const num = parseAmount(newCurrent);
            if (!isNaN(num)) {
                const difference = num - state.currentAmount;
                if (Math.abs(difference) > 0.001) {
                    const correctionNote = difference > 0 
                        ? `Корректировка: установлен баланс ${formatMoney(num)}` 
                        : `Корректировка: установлен баланс ${formatMoney(num)}`;
                    const correctionTransaction = {
                        id: Date.now(),
                        type: difference > 0 ? 'income' : 'expense',
                        amount: Math.abs(difference),
                        note: correctionNote,
                        date: new Date().toLocaleString() + ' (редактирование цели)',
                        timestamp: Date.now()
                    };
                    state.transactions.unshift(correctionTransaction);
                    state.currentAmount = num;
                }
            } else {
                alert("Введите корректное число");
            }
        }
        
        persist();
        renderAll();
    }

    function renderAll() {
        goalNameDisplay.innerText = state.goalName;
        targetAmountDisplay.innerText = formatMoney(state.targetAmount);
        const currentValue = state.currentAmount;
        currentAmountDisplay.innerText = formatMoney(currentValue);
        
        if (currentValue < 0) {
            currentAmountDisplay.classList.add('value-negative');
        } else {
            currentAmountDisplay.classList.remove('value-negative');
        }
        
        let percent = 0;
        let remainder = 0;
        if (state.currentAmount < 0) {
            percent = 0;
            remainder = state.targetAmount - state.currentAmount;
        } else if (state.currentAmount >= state.targetAmount) {
            percent = 100;
            remainder = 0;
        } else {
            percent = (state.currentAmount / state.targetAmount) * 100;
            remainder = state.targetAmount - state.currentAmount;
        }
        const percentClamped = Math.min(100, Math.max(0, percent));
        progressFill.style.width = `${percentClamped}%`;
        percentSpan.innerText = `${Math.floor(percentClamped)}%`;
        
        if (state.currentAmount < 0) {
            remainderSpan.innerText = `перерасход ${formatMoney(Math.abs(state.currentAmount))}`;
        } else {
            remainderSpan.innerText = formatMoney(remainder);
        }

        if (!state.transactions.length) {
            historyContainer.innerHTML = `<div class="empty-history">Журнал пуст. Добавьте операцию</div>`;
            return;
        }
        let html = '';
        for (let t of state.transactions) {
            const isIncome = t.type === 'income';
            const isExpense = t.type === 'expense';
            let typeClass = '', amountClass = '', typeText = '', sign = '';
            
            if (isIncome) {
                typeClass = 'income-type';
                amountClass = 'income-amount';
                typeText = 'ДОХОД';
                sign = '+';
            } else if (isExpense) {
                typeClass = 'expense-type';
                amountClass = 'expense-amount';
                typeText = 'РАСХОД';
                sign = '−';
            }
            
            const isCorrection = t.note && (t.note.includes('Корректировка') || t.note.includes('начальная сумма') || t.note.includes('установлен баланс'));
            if (isCorrection) {
                typeClass = 'correction-type';
                amountClass = 'correction-amount';
                typeText = '✎ КОРРЕКТИРОВКА';
            }
            
            html += `
                <div class="transaction-item">
                    <div class="transaction-left">
                        <div class="transaction-type ${typeClass}">${typeText}</div>
                        <div class="transaction-note">${escapeHtml(t.note)}</div>
                        <div class="transaction-date">${t.date}</div>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <div class="transaction-amount ${amountClass}">${sign} ${formatMoney(t.amount)}</div>
                        <button class="delete-transaction" data-id="${t.id}">✕</button>
                    </div>
                </div>
            `;
        }
        historyContainer.innerHTML = html;
        document.querySelectorAll('.delete-transaction').forEach(btn => {
            const id = parseInt(btn.getAttribute('data-id'));
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteTransaction(id);
            });
        });
        if (historyHidden) {
            historyContainer.classList.add('hidden');
            toggleHistoryBtn.innerText = '⌃ Показать';
        } else {
            historyContainer.classList.remove('hidden');
            toggleHistoryBtn.innerText = '⌄ Скрыть';
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function toggleHistory() {
        historyHidden = !historyHidden;
        if (historyHidden) {
            historyContainer.classList.add('hidden');
            toggleHistoryBtn.innerText = '⌃ Показать';
        } else {
            historyContainer.classList.remove('hidden');
            toggleHistoryBtn.innerText = '⌄ Скрыть';
        }
    }

    function handleAdd() {
        const type = transactionType.value;
        let amount = parseAmount(amountInput.value);
        const note = noteInput.value;
        if (isNaN(amount) || amount <= 0) {
            alert("Введите сумму больше нуля");
            return;
        }
        amount = Math.round(amount * 100) / 100;
        addTransaction(type, amount, note);
        amountInput.value = '';
        noteInput.value = '';
        amountInput.focus();
    }

    function handleKeyboardSubmit(e) {
        if (e.key === 'Enter' && (e.target === amountInput || e.target === noteInput)) {
            e.preventDefault();
            handleAdd();
        }
    }

    function bind() {
        addBtn.addEventListener('click', handleAdd);
        editGoalBtn.addEventListener('click', editGoal);
        clearHistoryBtn.addEventListener('click', clearAllHistory);
        toggleHistoryBtn.addEventListener('click', toggleHistory);
        amountInput.addEventListener('keypress', handleKeyboardSubmit);
        noteInput.addEventListener('keypress', handleKeyboardSubmit);
    }

    loadFromStorage();
    bind();

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/capital-pwa/sw.js')
            .then(reg => console.log('✅ SW registered:', reg))
            .catch(err => console.log('❌ SW error:', err));
    }
</script>
</body>
</html>
